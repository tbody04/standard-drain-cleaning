<html>
<head>
    <title>Luxury Standard Drain Cleaning</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
</head>
<body>
    <header>
        <h1>Welcome to Luxury Standard Drain Cleaning</h1>
        <nav>
            <ul>
                <li><a href="#services">Services</a></li>
                <li><a href="#testimonials">Testimonials</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="services">
            <h2>Our Services</h2>
            <ul>
                <li>Drain Cleaning</li>
                <li>Pipe Inspection</li>
                <li>Emergency Services</li>
            </ul>
        </section>
        <section id="testimonials">
            <h2>Testimonials</h2>
            <blockquote>
                <p>"Best service ever! Highly recommended!" - John Doe</p>
            </blockquote>
        </section>
        <section id="contact">
            <h2>Contact Us</h2>
            <form>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name"><br>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email"><br>
                <label for="message">Message:</label>
                <textarea id="message" name="message"></textarea><br>
                <input type="submit" value="Send">
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Luxury Standard Drain Cleaning</p>
    </footer>
</body>
</html>
